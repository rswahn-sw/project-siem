---
# First, apply common settings to all nodes (Security, Updates)
- name: Apply common configuration to all nodes
  hosts: all
  become: yes
  tasks:

    # Run apt update on all machines, saying yes to prompts
    - name: Update apt package lists
      shell: apt update -y
        
    # Run apt upgrade on all machines, saying yes to prompts
    - name: Upgrade all apt packages
      shell: apt upgrade -y
      register: upgrade_result  # Optional: Store output for later checks

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

# THE OFFICIAL ANSIBLE RULEBOOK STRUCTURE
# Points to other .yml files in the roles directory. This is the file that ansible-playbook will run.
# The ELK stack starts by installing Docker Engine. Then it installes elasticsearch and kibana through docker. 
- name: Install ELK Stack
  hosts: elk
  become: yes
  roles:
    - docker
    - elk

- name: Install Logstash
  hosts: logstash
  become: yes
  roles:
    - logstash

- name: Install Nginx Web Server
  hosts: webserver
  become: yes
  roles:
    - nginx

