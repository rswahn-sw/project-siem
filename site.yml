---
# First, apply common settings to all nodes (Security, Updates)
- name: Apply common configuration to all nodes
  hosts: all
  become: yes
  tasks:
    # Running apt update on all machines, saying yes to prompts
    - name: Update apt package lists
      shell: apt update -y
      args:
        warn: false  # Suppress warnings about apt lists being outdated
        
    # Running apt upgrade on all machines, saying yes to prompts
    - name: Upgrade all apt packages
      shell: apt upgrade -y
      register: upgrade_result  # Optional: Store output for later checks

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600


- name: Setup Docker for ELK
  hosts: elk
  become: yes
  tasks:
    - name: Install prerequisite packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Create directory for Docker GPG key
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker official GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        keyring: /etc/apt/keyrings/docker.gpg
        state: present

    - name: Add Docker Repository to sources.list
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Install Docker Engine and Plugins
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is started and enabled
      service:
        name: docker
        state: started
        enabled: yes


- name: Setup Nginx on webserver
  hosts: webserver
  become: yes
  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Ensure Nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Allow HTTP traffic through UFW
      ufw:
        rule: allow
        port: '80'
        proto: tcp


- name: Setup Filebeat on webserver
  hosts: webserver
  become: yes
  tasks:
    - name: Install prerequisite packages
      apt:
        name:
          - curl
          - gnupg
          - apt-transport-https
          - wget
        state: present
        update_cache: yes

    - name: Add Elastic GPG key
      shell: wget -qO - https://artifacts.elastic.co/GPG-KEY-elasticsearch | gpg --dearmor -o /usr/share/keyrings/elastic-keyring.gpg
      args:
        creates: /usr/share/keyrings/elastic-keyring.gpg

    - name: Add Elastic repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/elastic-keyring.gpg] https://artifacts.elastic.co/packages/9.x/apt stable main"
        filename: elastic-9.x
        state: present

    - name: Install Filebeat
      apt:
        name: filebeat
        state: present
        update_cache: yes

    - name: Ensure Filebeat is started and enabled
      service:
        name: filebeat
        state: started
        enabled: yes